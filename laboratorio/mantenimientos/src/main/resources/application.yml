server:
    port: 8085

spring:
    application:
        name: mantenimientos
    datasource:
        url: jdbc:mysql://localhost:3306/db_fabrica_cerveza?createDatabaseIfNotExist=true
        username: root
        password: 
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
    flyway:
        enabled: true
        baseline-on-migrate: true
        table: flyway_schema_history_mantenimientos