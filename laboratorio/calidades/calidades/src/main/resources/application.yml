server:
    port: 0

springdoc:
    api-docs:
        path: /calidades/api-docs

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

spring:
    application:
        name: calidades-service
    flyway:
        enabled: 'true'
        baseline-on-migrate: 'true'
        table: flyway_schema_history_calidades
    jpa:
        show-sql: 'true'
    profiles:
        active: dev

---

spring:
    config:
        activate:
            on-profile: dev
    datasource:
        url: jdbc:mysql://localhost:3306/db_fabrica_cerveza_dev?createDatabaseIfNotExist=true
        username: root
        password: ''
        driverClassName: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: update
        
---

spring:
    config:
        activate:
            on-profile: prod
    datasource:
        username: root
        url: jdbc:mysql://localhost:3306/db_fabrica_cerveza_prod?createDatabaseIfNotExist=true
        driverClassName: com.mysql.cj.jdbc.Driver
        password: ''
    jpa:
        hibernate:
            ddl-auto: none